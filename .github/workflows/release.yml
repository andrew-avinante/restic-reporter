name: release

# Publishes prebuilt binaries + archives to a GitHub Release when a semver tag
# is pushed. The install.sh one-liner downloads the assets produced here, so
# the one-liner only works after the first `git tag vX.Y.Z && git push --tags`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for goreleaser to create the GitHub Release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for the version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
